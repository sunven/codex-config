        if (command === "preview_delete_model_provider") {
          return {
            changed: true,
            fieldDiffs: [],

            fieldDiffs: [],
            textDiff: "-[mcp_servers.filesystem]\n-command = \"npx\"",
            candidateRawToml: qaState.rawToml,
          };
        }

        if (command === "preview_raw_toml") {
          return {
            changed: args.rawToml !== qaState.rawToml,
            fieldDiffs: [],
            textDiff: "-model = \"gpt-5\"\n+model = \"gpt-5-mini\"",
            candidateRawToml: args.rawToml,
          };
        }

        return {
          changed: true,
          fieldDiffs: [

              scope: "root",
              path: "model",
              label: "Model",
              before: "gpt-5",
              after: "gpt-5-mini",

          candidateRawToml: 'model = "gpt-5-mini"',
        };
      }

      function saveResult(statePatch) {
        return {
          changed: true,
          backupPath: "/Users/test/.codex/backups/config.toml.bak",
          state: clone({
            ...qaState,
            ...statePatch,
          }),
        };

      let callbackId = 0;

      window.__TAURI_INTERNALS__ = {
        transformCallback(callback) {
          callbackId += 1;
          window[`_${callbackId}`] = callback;
          return callbackId;
        },
        unregisterCallback(id) {
          delete window[`_${id}`];
        },
        invoke(command, args = {}) {
          console.info("[qa-harness] invoke", command, args);

          if (command === "load_state") {
            return Promise.resolve(clone(qaState));
          }

          if (command.startsWith("preview_") || command === "preview_changes") {
            return Promise.resolve(previewFor(command, args));
          }

          if (command === "read_skill_content") {
            return Promise.resolve({
              name: "tdd",
              description: "Test-driven development workflow.",
              path: args.path,
              rawMarkdown:
                "---\nname: tdd\n---\n# Test-driven development\nUse red-green-refactor for vertical slices.",

          }

          if (command === "delete_session") {
            return Promise.resolve(
              clone({
                ...qaState,
                codexSessions: {
                  ...qaState.codexSessions,
                  sessions: qaState.codexSessions.sessions.filter(
                    (session) => session.id !== args.id,
                  ),
                },
              }),
            );
          }

          if (command === "delete_model_provider") {
            return Promise.resolve(
              saveResult({
                modelProviders: {
                  ...qaState.modelProviders,
                  providers: qaState.modelProviders.providers.filter(
                    (provider) => provider.id !== args.id,
                  ),
                },
              }),
            );
          }

          if (command === "delete_mcp_server") {
            return Promise.resolve(
              saveResult({
                mcpServers: {
                  servers: qaState.mcpServers.servers.filter(
                    (server) => server.id !== args.id,
                  ),

              }),
            );
          }

          if (command === "save_skill_enabled") {
            return Promise.resolve(

                skills: {
                  ...qaState.skills,
                  skills: qaState.skills.skills.map((skill) =>
                    skill.path === args.path
                      ? { ...skill, enabled: args.enabled }
                      : skill,
                  ),
                },
              }),
            );
          }

          return Promise.resolve(saveResult({}));
        },
